# General settings — sensible defaults from Samoshkin's "tmux in practice."

set -g default-terminal "screen-256color"
set -g history-limit 20000
set -g buffer-limit 20
set -sg escape-time 0
set -g display-time 1500
set -g remain-on-exit off
set -g repeat-time 300
setw -g allow-rename off
setw -g automatic-rename off
setw -g aggressive-resize on

# Prefix: C-a, same as screen, easier to reach than C-b.
unbind C-b
set -g prefix C-a
bind-key a send-prefix

# Set parent terminal title to reflect current window.
set -g set-titles on
set -g set-titles-string "#I:#W"

# 1-indexed windows and panes.
set -g base-index 1
setw -g pane-base-index 1

# Mouse support.
set -g mouse on

# vi key bindings.
setw -g mode-keys vi


# === Key bindings ===
# Defaults are left alone. Additions only.

# Edit and reload configuration.
bind C-e new-window -n 'tmux.conf' "sh -c '\${EDITOR:-vim} ~/.tmux.conf && tmux source ~/.tmux.conf && tmux display \"Config reloaded\"'"
bind C-r source-file ~/.tmux.conf \; display "Config reloaded"

# New window retains cwd. Prompt to rename immediately.
bind c new-window -c "#{pane_current_path}"
set-hook -g after-new-window 'command-prompt -I "#{window_name}" "rename-window '%%'"'

# Splits retain cwd. | and _ in addition to defaults.
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Rename session and window.
bind r command-prompt -I "#{window_name}" "rename-window '%%'"
bind R command-prompt -I "#{session_name}" "rename-session '%%'"

# Kill pane/window/session.
bind x kill-pane
bind X kill-window
bind C-x confirm-before -p "kill other windows? (y/n)" "kill-window -a"
bind Q confirm-before -p "kill-session #S? (y/n)" kill-session

# Link window.
bind L command-prompt -p "Link window from (session:window): " "link-window -s %% -a"

# Merge session with another one.
bind C-u command-prompt -p "Session to merge with: " \
   "run-shell 'yes | head -n #{session_windows} | xargs -I {} -n 1 tmux movew -t %%'"

# Detach.
bind D if -F '#{session_many_attached}' \
    'confirm-before -p "Detach other clients? (y/n)" "detach -a"' \
    'display "Session has only 1 client attached"'

# Hide status bar on demand.
bind C-s if -F '#{s/off//:status}' 'set status off' 'set status on'

# Alan's tmux.run.sh bindings.
bind-key k run -b "perl ~/.dotfiles/bin/tmux.setpgrp.pl ~/.dotfiles/bin/tmux.run.sh #{window_index} #{pane_index}"
bind-key j run "~/.dotfiles/bin/tmux.kill.sh TERM"
bind-key K run "~/.dotfiles/bin/tmux.kill.sh KILL"


# === Window monitoring ===

bind m setw monitor-activity \; display-message 'Monitor window activity [#{?monitor-activity,ON,OFF}]'
bind M if -F '#{monitor-silence}' \
    'setw monitor-silence 0 ; display-message "Monitor window silence [OFF]"' \
    'command-prompt -p "Monitor silence: interval (s)" "setw monitor-silence %%"'

set -g visual-activity on


# === Copy mode and clipboard ===
# Yank integration from Samoshkin's clipboard series.

set -g @copy_use_osc52_fallback on

bind -n M-Up copy-mode

# Scroll by line and page.
bind -T copy-mode-vi M-Up              send-keys -X scroll-up
bind -T copy-mode-vi M-Down            send-keys -X scroll-down
bind -T copy-mode-vi M-PageUp          send-keys -X halfpage-up
bind -T copy-mode-vi M-PageDown        send-keys -X halfpage-down
bind -T copy-mode-vi PageDown          send-keys -X page-down
bind -T copy-mode-vi PageUp            send-keys -X page-up

# Reduce mouse scroll speed.
bind -T copy-mode-vi WheelUpPane       select-pane \; send-keys -X -N 2 scroll-up
bind -T copy-mode-vi WheelDownPane     select-pane \; send-keys -X -N 2 scroll-down

# Wrap default shell in reattach-to-user-namespace if available.
if -b "command -v reattach-to-user-namespace > /dev/null 2>&1" \
    "run 'tmux set -g default-command \"exec $(tmux show -gv default-shell) 2>/dev/null & reattach-to-user-namespace -l $(tmux show -gv default-shell)\"'"

yank="~/.dotfiles/got/samoshkin/tmux/tmux/yank.sh"

bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "$yank"
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "$yank"
bind -T copy-mode-vi Y send-keys -X copy-line \;\
    run "tmux save-buffer - | $yank"
bind-key -T copy-mode-vi D send-keys -X copy-end-of-line \;\
    run "tmux save-buffer - | $yank"
bind -T copy-mode-vi C-j send-keys -X copy-pipe-and-cancel "$yank"
bind-key -T copy-mode-vi A send-keys -X append-selection-and-cancel \;\
    run "tmux save-buffer - | $yank"

bind -T copy-mode-vi MouseDragEnd1Pane \
    send-keys -X copy-pipe "$yank"
bind -T copy-mode-vi MouseDown1Pane select-pane \;\
   send-keys -X clear-selection


# === Theme ===

# Palette. One accent, everything else recedes.
color_dark="colour235"
color_accent="colour108"
color_dim="colour245"
color_select="colour239"
color_off_indicator="colour131"
color_off_bg="colour236"

set -g mode-style "fg=default,bg=$color_select"
set -g message-style "fg=$color_accent,bg=$color_dark"
set -g status-style "fg=$color_dim,bg=$color_dark"

# Window list — clean. Active window is accent text, no background block.
set -g window-status-separator ""
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=$color_accent,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-activity-style "fg=$color_accent"
setw -g pane-active-border-style "fg=$color_accent"

# Status bar — bottom, minimal.
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-right-length 100

wg_session="#[fg=$color_accent] #S #[default]"
wg_is_zoomed="#[fg=$color_accent]#{?window_zoomed_flag, [Z],}#[default]"
wg_is_keys_off="#[fg=$color_off_indicator,bold]#([ $(tmux show-option -qv key-table) = 'off' ] && echo ' OFF')#[default]"
wg_date="#[fg=$color_dim]%h %d %H:%M#[default]"

set -g status-left "$wg_session"
set -g status-right "$wg_is_keys_off$wg_is_zoomed $wg_date "


# === Environment ===

set -g update-environment \
  "DISPLAY\
  SSH_ASKPASS\
  SSH_AUTH_SOCK\
  SSH_AGENT_PID\
  SSH_CONNECTION\
  SSH_TTY\
  WINDOWID\
  XAUTHORITY"

bind '$' run "~/.dotfiles/got/samoshkin/tmux/tmux/renew_env.sh"


# === Nesting ===
# From Samoshkin. F12 toggles local keys off, passing everything to the inner
# session. Visual feedback: status bar dims, OFF indicator appears.

if-shell 'test -n "$SSH_CLIENT"' \
    'source-file ~/.dotfiles/etc/tmux.remote.conf'

bind -T root F12  \
    set prefix None \;\
    set key-table off \;\
    set status-style "fg=$color_dim,bg=$color_off_bg" \;\
    set window-status-current-format " #I:#W " \;\
    set window-status-current-style "fg=$color_dim" \;\
    if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
    refresh-client -S \;\

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  set -u window-status-current-style \;\
  set -u window-status-current-format \;\
  refresh-client -S


# === Plugins ===

set -g @plugin 'tmux-plugins/tpm'

run '~/.tmux/plugins/tpm/tpm'
